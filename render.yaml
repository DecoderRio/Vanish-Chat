services:
  - type: web
    name: vanish-chat-backend
    env: python
    buildCommand: pip install -r server/requirements.txt
    startCommand: cd server && python main.py
    envVars:
      - key: JWT_SECRET
        generateValue: true
      - key: PORT
        value: 5000

  - type: web
    name: vanish-chat-frontend
    env: python
    buildCommand: pip install -r frontend/requirements.txt
    startCommand: cd frontend && streamlit run app.py --server.port=8501
    envVars:
      - key: BACKEND_URL
        value: https://vanish-chat-backend.onrender.com
